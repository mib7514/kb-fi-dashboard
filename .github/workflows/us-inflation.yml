name: US Inflation data (FRED)

# 미국 물가지수 4종(CPI H/C, PCE H/C)을 FRED에서 주 1회 자동 적재.
# 데이터가 실제로 바뀐 경우에만 커밋한다(diff 없으면 skip).

on:
  schedule:
    - cron: '0 0 * * 3'   # 매주 수요일 00:00 UTC
  workflow_dispatch: {}    # 수동 트리거

permissions:
  contents: write

concurrency:
  group: us-inflation
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch FRED series → data/us-inflation.json
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: node scripts/fetch-us-inflation.mjs

      - name: Commit if changed
        run: |
          if git diff --quiet -- data/us-inflation.json; then
            echo "갱신분 없음 — 커밋 skip."
            exit 0
          fi
          LAST=$(node -e "const d=require('./data/us-inflation.json');const ms=Object.values(d.series).map(s=>s.meta.last_updated).sort();process.stdout.write(ms[ms.length-1])")
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/us-inflation.json
          git commit -m "data: US 물가지수(FRED) ${LAST} 갱신"
          git push
