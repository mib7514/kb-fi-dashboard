<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>FI Dashboard</title>
<style>
  :root {
    --bg: #0d1117; --panel: #161b22; --panel-2: #1c2128;
    --border: #21262d; --border-2: #30363d;
    --text: #e6edf3; --muted: #8b949e; --accent: #58a6ff; --forecast: #f0883e;
    --mono: ui-monospace, "SF Mono", "Cascadia Code", Menlo, Consolas, monospace;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo", sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; background: var(--bg); color: var(--text); font-family: var(--sans); }
  body { padding: 28px 22px 80px; line-height: 1.5; }
  .wrap { max-width: 1180px; margin: 0 auto; }

  .eyebrow { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .step { font-size: 10px; font-weight: 700; letter-spacing: 0.04em; padding: 3px 8px; border-radius: 4px; background: var(--accent); color: #08111f; }
  .eyebrow .ctx { font-size: 12px; color: var(--muted); }
  h1 { font-size: 28px; font-weight: 700; letter-spacing: -0.02em; margin: 0 0 4px; }
  .tagline { font-size: 14px; color: var(--muted); margin: 0 0 26px; }

  .hub-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(290px, 1fr)); gap: 16px; }
  .hub-card { display: flex; flex-direction: column; background: var(--panel); border: 1px solid var(--border);
    border-radius: 11px; padding: 20px; text-decoration: none; color: inherit; transition: border-color .15s, transform .15s; }
  .hub-card:hover { border-color: var(--accent); transform: translateY(-2px); }
  .hub-card h2 { font-size: 17px; margin: 0 0 7px; color: var(--text); }
  .hub-card p { font-size: 13px; color: var(--muted); margin: 0 0 16px; line-height: 1.55; flex: 1; }
  .hub-card .foot { display: flex; align-items: baseline; justify-content: space-between; }
  .hub-card .meta { font-size: 11px; color: var(--muted); font-family: var(--mono); }
  .hub-card .arrow { font-size: 13px; color: var(--accent); font-weight: 600; }

  .empty { color: var(--muted); font-size: 13px; }
  .site-foot { margin-top: 40px; padding-top: 18px; border-top: 1px solid var(--border);
    font-size: 12px; color: var(--muted); font-family: var(--mono); letter-spacing: 0.01em; }
</style>
</head>
<body>
<div class="wrap">
  <div class="eyebrow">
    <span class="step">HUB</span>
    <span class="ctx">FI Dashboard · 무빌드 정적 데이터 대시보드</span>
  </div>
  <h1>FI Dashboard</h1>
  <p class="tagline">운용 판단 보조 모듈 모음 — 계산은 도구가, 원인 판단은 사람이.</p>

  <div class="hub-grid" id="hub-grid"></div>

  <footer class="site-foot">bp by bp — 확률적 우위의 누적</footer>
</div>

<!-- data (기준일 표시용 — window.FENRIR_SERIES 자기등록) -->
<script src="data/kr-cpi-headline.js"></script>
<script src="data/credit-spread.js"></script>
<script src="data/onoff-ktb3y.js"></script>
<!-- app -->
<script type="module">
  import { NAV_ITEMS } from './js/nav.js'; // nav 바 자동 렌더 + NAV_ITEMS 재사용

  // 모듈 id → 데이터 시리즈 키 (마지막 기준일 표시)
  const SERIES_KEY = { inflation: 'kr-cpi-headline', 'curve-rv': 'credit-spread' };
  const lastUpdated = (id) => {
    if (id === 'onoff') return (window.ONOFF_KTB3Y && window.ONOFF_KTB3Y.updated) || null;
    const key = SERIES_KEY[id];
    const s = key && window.FENRIR_SERIES && window.FENRIR_SERIES[key];
    return (s && s.meta && s.meta.last_updated) || null;
  };

  const cards = NAV_ITEMS.filter(i => i.id !== 'home').map(i => {
    const up = lastUpdated(i.id);
    return `<a class="hub-card" href="${i.file}">
      <h2>${i.title}</h2>
      <p>${i.desc}</p>
      <div class="foot">
        <span class="meta">${up ? '기준일 ' + up : '&nbsp;'}</span>
        <span class="arrow">열기 →</span>
      </div>
    </a>`;
  }).join('');
  document.getElementById('hub-grid').innerHTML =
    cards || '<div class="empty">등록된 모듈이 없습니다.</div>';
</script>
</body>
</html>
