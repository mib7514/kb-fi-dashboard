<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>국민소득 갭 모니터 — 교역조건 | FI Dashboard</title>
<style>
  :root {
    --bg: #0d1117; --panel: #161b22; --panel-2: #1c2128;
    --border: #21262d; --border-2: #30363d;
    --text: #e6edf3; --muted: #8b949e; --accent: #58a6ff; --red: #f85149; --ok: #3fb950; --amber: #f0883e;
    --mono: ui-monospace, "SF Mono", "Cascadia Code", Menlo, Consolas, monospace;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo", sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; background: var(--bg); color: var(--text); font-family: var(--sans); }
  body { padding: 28px 22px 80px; line-height: 1.5; }
  .wrap { max-width: 1100px; margin: 0 auto; }

  .eyebrow { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .step { font-size: 10px; font-weight: 700; letter-spacing: 0.04em; padding: 3px 8px; border-radius: 4px; background: var(--accent); color: #08111f; }
  .eyebrow .ctx { font-size: 12px; color: var(--muted); }
  h1 { font-size: 26px; font-weight: 700; letter-spacing: -0.02em; margin: 0 0 3px; }
  .tagline { font-size: 13px; color: var(--muted); margin: 0 0 20px; }

  /* 헤드라인 히어로 */
  .headline { background: linear-gradient(180deg, rgba(88,166,255,0.08), var(--panel)); border: 1px solid var(--border-2);
    border-radius: 12px; padding: 20px 22px; margin-bottom: 16px; }
  .hl-kicker { font-size: 12px; color: var(--muted); margin-bottom: 6px; }
  .hl-kicker .mono { font-family: var(--mono); color: var(--text); }
  .hl-value { font-size: 46px; font-weight: 700; font-family: var(--mono); letter-spacing: -0.02em; line-height: 1.05; }
  .hl-unit { font-size: 20px; color: var(--muted); margin-left: 4px; font-weight: 400; }
  .hl-word { font-size: 16px; font-family: var(--sans); font-weight: 600; margin-left: 12px; vertical-align: middle; }
  .hl-sub { font-size: 13px; color: var(--muted); margin-top: 8px; }

  .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(190px, 1fr)); gap: 10px; margin-bottom: 20px; }
  .stat { background: var(--panel); border: 1px solid var(--border); border-radius: 9px; padding: 13px 15px; }
  .stat-label { font-size: 11px; color: var(--muted); margin-bottom: 6px; }
  .stat-main { font-size: 23px; font-weight: 600; font-family: var(--mono); letter-spacing: -0.01em; }
  .stat-unit { font-size: 12px; color: var(--muted); margin-left: 3px; font-weight: 400; }
  .stat-sub { font-size: 10px; color: var(--muted); font-family: var(--mono); margin-top: 4px; }

  .chart-card { background: var(--panel); border: 1px solid var(--border); border-radius: 9px; padding: 10px 12px 6px; margin-bottom: 14px; }
  .chart-head { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; flex-wrap: wrap; padding: 2px 2px 6px; }
  .chart-head h2 { font-size: 14px; margin: 0; }
  .chart-head .cap { font-size: 11.5px; color: var(--muted); }
  .chart-box { width: 100%; height: 300px; }

  .controls { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; margin: 4px 0 12px; }
  .ctrl-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; }
  .seg { display: inline-flex; background: var(--panel); border: 1px solid var(--border-2); border-radius: 7px; overflow: hidden; }
  .seg button { background: transparent; border: none; color: var(--muted); font-family: var(--mono);
    font-size: 12px; padding: 6px 14px; cursor: pointer; border-right: 1px solid var(--border); }
  .seg button:last-child { border-right: none; }
  .seg button.active { background: var(--accent); color: #08111f; font-weight: 600; }
  .seg button:hover:not(.active) { background: var(--panel-2); color: var(--text); }
  .beta-info { font-size: 11px; color: var(--muted); font-family: var(--mono); line-height: 1.7; }
  .beta-info .k { color: var(--text); }

  .footnote { font-size: 11px; color: var(--muted); margin-top: 12px; line-height: 1.7; }
  .footnote .k { font-family: var(--mono); color: var(--text); }
  .footnote > div { margin-bottom: 4px; }

  .empty { color: var(--muted); font-size: 13px; padding: 24px; text-align: center; line-height: 1.9;
    background: var(--panel); border: 1px solid var(--border); border-radius: 9px; margin-top: 16px; }
  .empty code { background: var(--panel-2); padding: 1px 5px; border-radius: 4px; font-family: var(--mono); }
</style>
</head>
<body>
<div class="wrap" id="app">
  <div class="eyebrow">
    <span class="step">MONITOR</span>
    <span class="ctx">측정 레이어 · 교역조건 → 국민소득 갭 프록시</span>
  </div>
  <h1>국민소득 갭 모니터</h1>
  <p class="tagline">교역조건(수출가격÷수입가격)이 지금 국민소득(GDI)에 몇 %p를 얹고 있나 · 전량 ECOS · 갭 항만 측정(GDP 레벨 전망 무관)</p>

  <!-- 1) 헤드라인 히어로 -->
  <div class="headline" id="headline"></div>

  <!-- 요약 배지 -->
  <div class="stats" id="summary"></div>

  <!-- 2) 줄다리기 차트 -->
  <div class="chart-card">
    <div class="chart-head">
      <h2>줄다리기 — 수출가격 vs 수입가격 (최근 5년)</h2>
      <span class="cap">수출가격이 이기면 소득이 늘고, 수입가격(유가 등)이 이기면 소득이 샌다</span>
    </div>
    <div class="chart-box" id="chart-tug"></div>
  </div>

  <!-- 3) 갭 추이 차트 -->
  <div class="chart-card">
    <div class="chart-head">
      <h2>갭 추이 — 프록시(월간) vs 실적(분기) (최근 10년)</h2>
      <span class="cap">실적 점(●)이 프록시 라인에 붙어 있으면 프록시가 잘 맞고 있다는 뜻</span>
    </div>
    <div class="chart-box" id="chart-gap"></div>
  </div>

  <!-- 4) 하단 컨트롤·정보 -->
  <div class="controls">
    <span class="ctrl-label">β 룩백</span>
    <div class="seg" id="lookback-seg">
      <button data-lb="5y">5년</button>
      <button data-lb="10y" class="active">10년</button>
      <button data-lb="all">전체</button>
    </div>
    <div class="beta-info" id="beta-info"></div>
  </div>
  <div class="footnote" id="footnote"></div>
</div>

<!-- 공통 내비게이션 -->
<script type="module" src="js/nav.js"></script>
<!-- vendor -->
<script src="vendor/plotly.min.js"></script>
<!-- app (ES module) -->
<script type="module">
  import { initGG1 } from './js/gg1-ui.js';
  initGG1();
</script>
</body>
</html>
